site_name: Personal Documentation
site_description: Personal homelab, infrastructure, service, hardware, and operations notes.
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.snippets:
      base_path: .
  - pymdownx.superfences
  - toc:
      permalink: true

exclude_docs: |
  !/templates/
  !/templates/**

nav:
  - Home: index.md
  - Infrastructure:
      - infrastructure/index.md
      - OTBR:
          - infrastructure/otbr/index.md
          - Overview: infrastructure/otbr/overview.md
          - Configuration: infrastructure/otbr/configuration.md
          - Updates: infrastructure/otbr/updates.md
          - Scripts:
              - Script Index: infrastructure/otbr/scripts/index.md
              - Update Script: infrastructure/otbr/scripts/update-otbr-from-source.md
              - Systemd Units: infrastructure/otbr/scripts/systemd-units.md
              - Helper Commands: infrastructure/otbr/scripts/helper-commands.md
          - Changes: infrastructure/otbr/changes.md
          - Notes: infrastructure/otbr/notes.md
  - Services:
      - services/index.md
      - Vaultwarden:
          - services/vaultwarden/index.md
          - Overview: services/vaultwarden/overview.md
          - Configuration: services/vaultwarden/configuration.md
          - Updates: services/vaultwarden/updates.md
          - Backup / Restore: services/vaultwarden/backup-restore.md
          - Scripts:
              - Script Index: services/vaultwarden/scripts/index.md
              - Update Script: services/vaultwarden/scripts/update-script.md
              - Deploy Web Vault: services/vaultwarden/scripts/deploy-webvault.md
              - Backup Script: services/vaultwarden/scripts/backup-script.md
              - Healthcheck: services/vaultwarden/scripts/healthcheck.md
              - Systemd Units: services/vaultwarden/scripts/systemd-units.md
              - Environment: services/vaultwarden/scripts/environment.md
          - Changes: services/vaultwarden/changes.md
          - Notes: services/vaultwarden/notes.md
  - Applications:
      - applications/index.md
  - Networking:
      - networking/index.md
  - Hardware:
      - hardware/index.md
  - Automation:
      - automation/index.md
  - Scripts:
      - scripts/index.md
  - Templates:
      - templates/item-template.md
      - templates/script-template.md
      - templates/change-log-template.md
      - templates/notes-template.md